<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时排名装置</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .container {
            max-width: 1000px;
            margin-top: 30px;
        }
        .header-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .ranking-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .table thead th {
            border-top: none;
            color: #6c757d;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .player-row {
            transition: all 0.3s ease;
        }
        .player-row:hover {
            background-color: #f1f4f9;
            transform: scale(1.01);
        }
        .rank-badge {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }
        .rank-1 { background-color: #ffd700; color: #fff; }
        .rank-2 { background-color: #c0c0c0; color: #fff; }
        .rank-3 { background-color: #cd7f32; color: #fff; }
        .rank-other { background-color: #e9ecef; color: #6c757d; }
        
        .vote-count {
            font-weight: bold;
            color: #2575fc;
            font-size: 1.1rem;
        }
        .group-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background-color: #eef2f7;
            color: #555;
        }
        .update-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .refresh-btn {
            background-color: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 20px;
            padding: 5px 20px;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background-color: rgba(255,255,255,0.3);
            color: white;
        }
        .player-img {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            object-fit: cover;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card text-center">
        <h2 id="active-name">{{ active_name }}</h2>
        <p class="mt-2">实时排名数据监控面板</p>
        <div class="d-flex justify-content-center align-items-center mt-4">
            <span class="update-info me-3">最后更新: <span id="last-updated">{{ last_updated }}</span></span>
            <button class="btn refresh-btn" onclick="refreshData()" id="refresh-btn">
                <span id="btn-text">手动刷新</span>
            </button>
        </div>
    </div>

    <div class="ranking-card">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th width="80">排名</th>
                    <th>作品名称</th>
                    <th width="120">所属分组</th>
                    <th width="120" class="text-end">票数</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                {% for player in players %}
                <tr class="player-row">
                    <td>
                        <div class="rank-badge {% if loop.index == 1 %}rank-1{% elif loop.index == 2 %}rank-2{% elif loop.index == 3 %}rank-3{% else %}rank-other{% endif %}">
                            {{ loop.index }}
                        </div>
                    </td>
                    <td>
                        <div class="d-flex align-items-center">
                            {% if player.image %}
                            <img src="{{ player.image }}" class="player-img" alt="img">
                            {% endif %}
                            <span>{{ player.name }}</span>
                        </div>
                    </td>
                    <td><span class="group-tag">{{ player.group }}</span></td>
                    <td class="text-end"><span class="vote-count">{{ player.votes }}</span> <small class="text-muted">票</small></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    async function refreshData() {
        const btn = document.getElementById('refresh-btn');
        const btnText = document.getElementById('btn-text');
        btn.disabled = true;
        btnText.innerText = '正在刷新...';

        try {
            const response = await fetch('/api/refresh');
            const result = await response.json();
            
            if (result.success) {
                updateUI(result.data, result.last_updated);
            } else {
                alert('刷新失败: ' + (result.error || '未知错误'));
            }
        } catch (error) {
            console.error('Refresh error:', error);
            alert('网络错误');
        } finally {
            btn.disabled = false;
            btnText.innerText = '手动刷新';
        }
    }

    function updateUI(data, lastUpdated) {
        document.getElementById('last-updated').innerText = lastUpdated;
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = '';

        data.forEach((player, index) => {
            const loopIndex = index + 1;
            let rankClass = 'rank-other';
            if (loopIndex === 1) rankClass = 'rank-1';
            else if (loopIndex === 2) rankClass = 'rank-2';
            else if (loopIndex === 3) rankClass = 'rank-3';

            const row = `
                <tr class="player-row">
                    <td>
                        <div class="rank-badge ${rankClass}">
                            ${loopIndex}
                        </div>
                    </td>
                    <td>
                        <div class="d-flex align-items-center">
                            ${player.image ? `<img src="${player.image}" class="player-img" alt="img">` : ''}
                            <span>${player.name}</span>
                        </div>
                    </td>
                    <td><span class="group-tag">${player.group}</span></td>
                    <td class="text-end"><span class="vote-count">${player.votes}</span> <small class="text-muted">票</small></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // 每 5 分钟自动刷新一次
    setInterval(refreshData, 5 * 60 * 1000);
</script>

</body>
</html>
